<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fingerprints</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const GRID_N   = 24;        // N × N cells
const GAP_FRAC = 0.0;    // gap between cells as a fraction of scene height
const PAPER    = 0xF0EBE1; // renderer clear / background colour

// ─── VERTEX SHADER ───────────────────────────────────────────────────────────
const vert = /* glsl */`
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// ─── FRAGMENT SHADER ─────────────────────────────────────────────────────────
const frag = /* glsl */`
  precision highp float;

  #define PI  3.14159265358979
  #define TAU 6.28318530717959

  uniform float time;
  uniform float type;   // 0–7  fingerprint archetype (float for compat)
  uniform float seed;   // per-cell random seed
  uniform vec2  core;   // core location in UV [0,1]²

  varying vec2 vUv;

  // ── Noise ────────────────────────────────────────────────────────────────
  float h21(vec2 p) {
    p = fract(p * vec2(127.1, 311.7));
    p += dot(p, p + 45.23);
    return fract(p.x * p.y);
  }

  float vnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(h21(i),               h21(i + vec2(1.0, 0.0)), f.x),
      mix(h21(i + vec2(0.0, 1.0)), h21(i + vec2(1.0, 1.0)), f.x),
      f.y
    );
  }

  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++) {
      v += a * vnoise(p);
      p  = p * 2.07 + vec2(1.72, 9.23);
      a *= 0.5;
    }
    return v;
  }

  // ── Phase fields ─────────────────────────────────────────────────────────
  // Each returns a scalar whose level-sets are fingerprint ridges.
  // All accept a point in approximately [-1,1]².

  // Plain arch — gently arching horizontal lines
  float archPhase(vec2 p) {
    return p.y
         + 0.38 * exp(-1.9 * p.x * p.x)
         + 0.07 * sin(p.x * 2.6);
  }

  // Tented arch — sharp central tent / spike
  float tentedPhase(vec2 p) {
    float tent = 0.52 * max(0.0, 1.0 - 1.75 * abs(p.x));
    return p.y + tent;
  }

  // Loop — Im[√z] gives parabolic ridges curving around the core.
  //   dir = +1.0 → ulnar/right loop; -1.0 → radial/left loop.
  //   The branch-cut discontinuity is invisible because we later take abs(sin).
  float loopPhase(vec2 d, float dir) {
    d.x *= dir;
    float r     = sqrt(max(dot(d, d), 1e-5));
    float theta = atan(d.y, d.x);
    return sqrt(r) * sin(theta * 0.5);
  }

  // Plain whorl — concentric with a slight spiral
  float whorlPhase(vec2 d) {
    float r     = length(d);
    float theta = atan(d.y, d.x);
    return r * 1.12 + theta * 0.028;
  }

  // Central pocket loop — whorl at centre, loop at periphery
  float cplPhase(vec2 d) {
    float inner = whorlPhase(d * 1.4);
    float outer = loopPhase(d, 1.0);
    return mix(inner, outer, smoothstep(0.28, 0.80, length(d)));
  }

  // Double loop — two parabolic systems, S-shaped ridges
  float doublePhase(vec2 d) {
    vec2  d1 = d + vec2( 0.28, -0.07);
    vec2  d2 = d - vec2( 0.28, -0.07);
    float l1 = loopPhase(d1,  1.0);
    float l2 = loopPhase(d2, -1.0);
    float t  = smoothstep(-0.30, 0.30, d.y * 0.78 - d.x * 0.24);
    return mix(l1, l2, t);
  }

  // ── Main ─────────────────────────────────────────────────────────────────
  void main() {
    vec2 uv = vUv;

    // Thin border drawn inside the cell UV
    float bw      = 0.05;
    bool  onBorder = uv.x < bw || uv.x > 1.0 - bw
                  || uv.y < bw || uv.y > 1.0 - bw;

    // Centre-map UV to [-1,1]²
    vec2 p = uv * 2.0 - 1.0;

    // Core position with slow animated drift
    float tc = time * 0.065;
    vec2  c  = core * 2.0 - 1.0
             + 0.048 * vec2(sin(tc * 1.13 + seed),
                            cos(tc * 0.81 + seed * 3.07));

    // Domain warp — slow organic deformation of sample coordinates
    float tw  = time * 0.25;
    vec2  sv2 = vec2(seed * 7.13 + 1.05, seed * 4.87 + 2.34);
    vec2  warp = vec2(
      fbm(p * 1.55 + sv2 + vec2(tw, 0.0)),
      fbm(p * 1.55 + sv2 + vec2(0.0, tw) + vec2(3.71, 1.83))
    );
    vec2 wp = p + 0.15 * (warp * 2.0 - 1.0);

    // Vector from warped sample point to animated core
    vec2 d = wp - c;

    // Select archetype phase field
    int itype = int(type + 0.5);
    float phase;

    if      (itype == 0) phase = archPhase(wp);
    else if (itype == 1) phase = tentedPhase(wp);
    else if (itype == 2) phase = loopPhase(d,  1.0);
    else if (itype == 3) phase = loopPhase(d, -1.0);
    else if (itype == 4) phase = whorlPhase(d);
    else if (itype == 5) phase = cplPhase(d);
    else if (itype == 6) phase = doublePhase(d);
    else {
      // Accidental — irregular mix of whorl + off-axis loop
      float s  = fract(seed * 0.173 + 0.31);
      vec2  c2 = c + 0.40 * vec2(cos(s * TAU), sin(s * TAU));
      float p1 = whorlPhase(d);
      float p2 = loopPhase(wp - c2, sin(seed * 8.1) > 0.0 ? 1.0 : -1.0);
      float t2 = smoothstep(-0.55, 0.55,
                   wp.x * cos(s * TAU * 0.4) + wp.y * sin(s * TAU * 0.4));
      phase = mix(p1, p2, t2);
    }

    // Small phase noise → natural ridge irregularities and pore-like gaps
    phase += 0.222 * (fbm(wp * 10.5 + seed * 6.3 + time * 0.011) - 0.5);

    // Ridge extraction using abs(sin) — handles branch-cut seams cleanly
    float ridgeFreq = 9.5;
    float sv   = abs(sin(phase * PI * ridgeFreq));
    float aa   = 0.25;           // anti-alias width
    float rw   = 0.75;           // ridge:valley ratio (~50/50 at rw≈0.70)
    float ridge = 1.0 - smoothstep(rw - aa, rw + aa, sv);

    // Ink density variation — simulates uneven ink on skin ridges
    float inkV = 0.68 + 0.22 * fbm(wp * 4.8 + seed * 8.5);
    ridge *= inkV;

    // Edge fade — fingerprint impression doesn't reach the corners
    float ef = smoothstep(0.0, 0.0,
                 min(min(uv.x, 1.0 - uv.x), min(uv.y, 1.0 - uv.y)));
    ridge *= ef;

    // Colours
    vec3 paper = vec3(0.945, 0.918, 0.874); // warm off-white
    vec3 ink   = vec3(0.072, 0.054, 0.037); // warm near-black

    vec3 col = mix(paper, ink, ridge);

    // Subtle paper micro-grain
    col += 0.1 * (fbm(uv * 60.0 + seed * 2.6) - 0.5);

    // Thin border in a dark warm tone
    if (onBorder) col = vec3(0.10, 0.082, 0.062);

    gl_FragColor = vec4(col, 1.0);
  }
`;

import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/controls/OrbitControls.js';

// ─── RENDERER ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(PAPER);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ─── CAMERA (works with either projection) ───────────────────────────────────
let aspect = window.innerWidth / window.innerHeight;

const USE_ORTHO = true; // set true to use orthographic camera

const FOV = 10;
const NEAR = 0.1;
const FAR = 200;
const CAMERA_Z = 10;

const ORTHO_HALF_H = 5.0;
const ORTHO_NEAR = 0.65;
const ORTHO_FAR = 20;

const camera = USE_ORTHO
  ? new THREE.OrthographicCamera(
      -aspect * ORTHO_HALF_H,
       aspect * ORTHO_HALF_H,
       ORTHO_HALF_H,
      -ORTHO_HALF_H,
       ORTHO_NEAR,
       ORTHO_FAR
    )
  : new THREE.PerspectiveCamera(FOV, aspect, NEAR, FAR);

camera.position.set(0, 0, CAMERA_Z);

// ─── SCENE ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = false; // no animate() changes needed
controls.enablePan = true;
controls.enableZoom = true;
controls.enableRotate = true;
controls.target.set(0, 0, 0);

if (camera.isPerspectiveCamera) {
  controls.minDistance = 1.0;
  controls.maxDistance = 30.0;
} else if (camera.isOrthographicCamera) {
  controls.minZoom = 0.5;
  controls.maxZoom = 8.0;
}

controls.update();

// Keep controls in sync after projection matrix changes on resize
window.addEventListener('resize', () => controls.update());

// ─── GRID LAYOUT ─────────────────────────────────────────────────────────────
function buildGrid() {
  // Remove existing meshes
  while (scene.children.length) scene.remove(scene.children[0]);

  const H   = 5.5;             // scene height (camera top − bottom)
  const W   = H * aspect;
  const gap = GAP_FRAC * H;

  // Largest square cell fitting an N×N grid with outer+inner gaps
  const cellW = (W - gap * (GRID_N + 1)) / GRID_N;
  const cellH = (H - gap * (GRID_N + 1)) / GRID_N;
  const cell  = Math.min(cellW, cellH);

  // Total grid extents (cells only, outer gaps handled by centering)
  const gridW = GRID_N * cell + (GRID_N - 1) * gap;
  const gridH = GRID_N * cell + (GRID_N - 1) * gap;

  // Distribute all 8 archetypes across the grid, shuffled
  const types = Array.from({ length: GRID_N * GRID_N }, (_, i) => i % 8);
  for (let i = types.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [types[i], types[j]] = [types[j], types[i]];
  }

  const geo = new THREE.PlaneGeometry(cell, cell); // shared across all cells

  for (let row = 0; row < GRID_N; row++) {
    for (let col = 0; col < GRID_N; col++) {
      const idx = row * GRID_N + col;
      const x   = -gridW / 2 + col * (cell + gap) + cell / 2;
      const y   =  gridH / 2 - row * (cell + gap) - cell / 2;

      const mat = new THREE.ShaderMaterial({
        vertexShader:   vert,
        fragmentShader: frag,
        uniforms: {
          time: { value: 0.0 },
          type: { value: types[idx] },
          seed: { value: Math.random() * 100.0 },
          core: { value: new THREE.Vector2(
            0.50 + (Math.random() - 0.5) * 0.30,
            0.50 + (Math.random() - 0.5) * 0.30
          )}
        }
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, 0);
      scene.add(mesh);
    }
  }
}

buildGrid();

// ─── ANIMATION ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  scene.children.forEach(m => {
    if (m.material && m.material.uniforms) m.material.uniforms.time.value = t;
  });
  renderer.render(scene, camera);
})();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  aspect = w / h;
  camera.left   = -aspect;
  camera.right  =  aspect;
  camera.top    =  1;
  camera.bottom = -1;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  buildGrid(); // regenerate grid for new aspect ratio
});

</script>
</body>
</html>
