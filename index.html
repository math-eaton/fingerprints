<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fingerprints</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; }

    .lil-gui {
      /* Layout */
      --width:              245px;
      --padding:            4px;
      --spacing:            4px;
      --widget-height:      20px;
      --name-width:         45%;

      /* Typography */
      --font-size:          11px;
      --input-font-size:    11px;
      --font-family:        Helvetica, Arial, sans-serif;
      --font-family-mono:   monospace;

      /* Colors */
      --background-color:   #1f1f1f;
      --text-color:         #ebebeb;
      --title-background-color: #111111;
      --title-text-color:   #ebebeb;
      --widget-color:       #424242;
      --hover-color:        #4f4f4f;
      --focus-color:        #595959;
      --number-color:       #2cc9ff;
      --string-color:       #a2db3c;
    }

    /* ── GUI toggle button ────────────────────────────────────────────── */
    #gui-toggle {
      position: fixed;
      top: 0;
      right: 0;
      width:  32px;
      height: 32px;
      display: none;           /* JS sets display:flex to reveal */
      align-items: center;
      justify-content: center;
      background: var(--title-background-color, #111);
      color:      var(--title-text-color,       #ebebeb);
      font-size:  15px;
      border: none;
      cursor: pointer;
      z-index: 1001;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    #gui-toggle:hover { opacity: 1; }
  </style>
</head>
<body>
  <button id="gui-toggle" title="Open controls">&#9776;</button>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
